providers:
  openai:
    base_url: ${OPENAI_BASE_URL}
    api_key: ${OPENAI_API_KEY}
    timeout_ms: 10000
  anthropic:
    base_url: ${ANTHROPIC_BASE_URL}
    api_key: ${ANTHROPIC_API_KEY}
    timeout_ms: 10000

models:
  - id: qwen3.5-flash
    provider: openai
    task: generation
    enabled: true
    priority: 10
    max_context_tokens: 128000
    input_price_per_1k: 0.00015
    output_price_per_1k: 0.0006

routes:
  rag_qa:
    generation:
      - qwen3.5-flash
    embedding: []
  chat:
    generation:
      - qwen3.5-flash
    embedding: []
  agent:
    generation:
      - qwen3.5-flash
    embedding: []
  ingestion:
    generation: []
    embedding: []
