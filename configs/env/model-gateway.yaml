providers:
  openai:
    base_url: ${OPENAI_BASE_URL}
    api_key: ${OPENAI_API_KEY}
    timeout_ms: 10000
  anthropic:
    base_url: ${ANTHROPIC_BASE_URL}
    api_key: ${ANTHROPIC_API_KEY}
    timeout_ms: 10000

models:
  - id: gpt-4o-mini
    provider: openai
    task: generation
    enabled: true
    priority: 10
    max_context_tokens: 128000
    input_price_per_1k: 0.00015
    output_price_per_1k: 0.0006
  - id: claude-3-5-haiku
    provider: anthropic
    task: generation
    enabled: true
    priority: 20
    max_context_tokens: 200000
    input_price_per_1k: 0.00025
    output_price_per_1k: 0.00125
  - id: text-embedding-3-large
    provider: openai
    task: embedding
    enabled: true
    priority: 10
    input_price_per_1k: 0.00013
    output_price_per_1k: 0.0

routes:
  rag_qa:
    generation:
      - gpt-4o-mini
      - claude-3-5-haiku
    embedding: []
  chat:
    generation:
      - gpt-4o-mini
      - claude-3-5-haiku
    embedding: []
  agent:
    generation:
      - gpt-4o-mini
      - claude-3-5-haiku
    embedding: []
  ingestion:
    generation: []
    embedding:
      - text-embedding-3-large

